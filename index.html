<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Journey Calculator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

```
<div class="container">
    <h1>🌟 Life Journey Calculator</h1>
    <p>Discover your age, milestones, and birthday insights.</p>

    <div class="card">
        <label>Date of Birth</label>
        <input type="date" id="dob">

        <button onclick="calculateJourney()">
            Calculate My Journey
        </button>
    </div>

    <div class="result" id="result" style="display:none;">
        <h2>Your Journey</h2>

        <div class="result-box">
            <p><strong>Age:</strong> <span id="age"></span></p>
            <p><strong>Days Lived:</strong> <span id="days"></span></p>
            <p><strong>Hours Lived:</strong> <span id="hours"></span></p>
            <p><strong>Born On:</strong> <span id="weekday"></span></p>
            <p><strong>Zodiac Sign:</strong> <span id="zodiac"></span></p>
            <p><strong>Next Birthday In:</strong> <span id="birthday"></span></p>
        </div>
    </div>

    <div class="footer">
        <h3>Abirami Jeyakumar</h3>
        <p>abirami@example.com</p>

        <a href="https://digitalheroesco.com"
           target="_blank"
           class="hero-btn">
           Built for Digital Heroes
        </a>
    </div>
</div>

<script src="js/script.js"></script>
```

</body>
</html>
